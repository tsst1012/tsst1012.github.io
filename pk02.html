<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PKゲーム</title>
    <link rel="stylesheet" href="style02.css">
</head>
<body>

    <h1>⚽ PKゲーム ⚽</h1>
    
    <div id="info">
        ラウンド: <span id="round-text">1</span> / 5 | 
        スコア: <span id="score-text">0</span>点
    </div>

    <div id="game-board">
        <!-- ゴールの枠 -->
        <div id="goal"></div>

        <!-- 的（ボタン） -->
        <div id="targets">
            <div class="target-btn" id="btn-top-left"></div>
            <div class="target-btn" id="btn-top-center"></div>
            <div class="target-btn" id="btn-top-right"></div>
            <div class="target-btn" id="btn-bottom-left"></div>
            <div class="target-btn" id="btn-bottom-center"></div>
            <div class="target-btn" id="btn-bottom-right"></div>
        </div>

        <!-- キーパーとボール -->
        <div id="keeper">🧍‍♂️</div>
        <div id="ball">⚽</div>
    </div>

    <div id="message">的をクリックしてシュート！</div>

    <!-- JSでイベントを付けるため id="reset-btn" を追加 -->
    <button class="reset" id="reset-btn">最初からやり直す</button>

    <!-- pk02.jsを読み込む -->
    <script src="pk02.js"></script>
</body>
</html>
